<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 銀鑫業務開發 CRM</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 30px; color: #333; }
    .container { max-width: 650px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h2 { color: #2c3e50; border-bottom: 2px solid #eceff1; padding-bottom: 10px; }
    .section { margin-bottom: 25px; padding: 20px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fafafa; }
    .section-title { font-weight: bold; margin-bottom: 15px; color: #34495e; font-size: 18px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #444; }
    input[type="text"], input[type="email"], select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    .row { display: flex; gap: 15px; }
    .row > div { flex: 1; }
    button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px;}
    .btn-add { background-color: #2ecc71; color: white; }
    .btn-send { background-color: #3498db; color: white; display: none; }
    .btn-load { background-color: #9b59b6; color: white; }
    .btn-orange { background-color: #e67e22; color: white; display: none; }
    .status-box { margin-top: 10px; padding: 12px; border-radius: 6px; font-size: 14px; display: none; font-weight: bold; }
    .success { background-color: #d4edda; color: #155724; }
    .error { background-color: #f8d7da; color: #721c24; }
    .list-item { background: white; padding: 12px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 8px; display: flex; align-items: center; }
    .list-item input { width: 20px; height: 20px; margin-right: 15px; cursor: pointer; }
    .list-info { flex: 1; font-size: 14px; line-height: 1.5;}
    .badge-read { background: #d4edda; color: #155724; padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
    .badge-unread { background: #e2e3e5; color: #6c757d; padding: 3px 8px; border-radius: 12px; font-size: 12px; }
    .badge-count { background: #fff3cd; color: #856404; padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-left: 5px; }
    .badge-click { background: #f8d7da; color: #c82333; padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-left: 5px; border: 1px solid #f5c6cb; }
  </style>
</head>
<body>

<div class="container">
  <h2>🚀 銀鑫業務開發 CRM中控台</h2>
  
  <div class="section">
    <div class="section-title">👤 新增潛在客戶</div>
    <div class="row">
      <div><input type="text" id="name" placeholder="姓名 (例: 王小明)" required></div>
      <div><input type="email" id="email" placeholder="Email" required></div>
    </div>
    <div class="row">
      <div><select id="tag"><option value="台灣廠房">🇹🇼 台灣廠房</option><option value="外國市場">🌍 外國市場</option></select></div>
      <div><select id="source"><option value="AMPA台北汽配展">AMPA 台北汽配展</option><option value="彰化廠區拜訪">實體拜訪</option><option value="網路搜尋">網路搜尋</option></select></div>
    </div>
    <button type="button" class="btn-add" onclick="addRecipient()">➕ 寫入資料庫</button>
    <div id="addStatus" class="status-box"></div>
  </div>

  <div class="section" style="border-color: #3498db; background: #f0f7fc;">
    <div class="section-title" style="color: #2980b9;">🎯 勾選發送新開發信 (第一封)</div>
    <button type="button" class="btn-load" style="background-color: #3498db;" onclick="loadFirstSendList()">📥 載入待發送名單</button>
    <div id="firstSendContainer" style="margin-top: 15px;"></div>
    <button type="button" class="btn-send" id="btnTriggerSend" onclick="sendFirstEmails()">✉️ 批量發送勾選的開發信</button>
    <div id="sendStatus" class="status-box"></div>
  </div>

  <div class="section" style="border-color: #9b59b6; background: #f9f0fc;">
    <div class="section-title" style="color: #8e44ad;">🔄 潛在客戶跟進系統 (第二封)</div>
    <button type="button" class="btn-load" onclick="loadFollowUpList()">📥 載入可跟進名單</button>
    <div id="followUpContainer" style="margin-top: 15px;"></div>
    <button type="button" class="btn-orange" id="btnSendFollowUp" onclick="sendFollowUps()">🚀 批量發送勾選的跟進信</button>
    <div id="followUpStatus" class="status-box"></div>
  </div>

  <div class="section" style="border-color: #e74c3c; background: #fdf2f2;">
    <div class="section-title" style="color: #c0392b;">🔄 終極再行銷模式 (一二封皆無回覆)</div>
    <button type="button" class="btn-load" style="background-color: #e74c3c;" onclick="loadReEngageList()">📥 載入再行銷名單</button>
    <div id="reEngageContainer" style="margin-top: 15px;"></div>
    <button type="button" class="btn-orange" id="btnSendReEngage" style="background-color: #d35400; display: none;" onclick="sendReEngages()">✉️ 批量重寄第一封開發信</button>
    <div id="reEngageStatus" class="status-box"></div>
  </div>
</div>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzH0LYRuKcK9V4oCQpjJje4cz4SrCIqzj3k3Nbp8HZRD6H04AZW0WHJJugoptcyOGh57w/exec"; 

  function generateListHtml(data, checkboxClass) {
    let html = "";
    data.forEach(item => {
      const isRead = item.readStatus && item.readStatus.indexOf("已開啟") !== -1;
      const readBadge = isRead ? `<span class="badge-read">${item.readStatus}</span>` : `<span class="badge-unread">${item.readStatus}</span>`;
      
      // 🌟 判斷是否顯示點擊火徽章
      const isClicked = item.clickStatus && item.clickStatus.indexOf("已點擊") !== -1;
      const clickBadge = isClicked ? `<span class="badge-click">${item.clickStatus}</span>` : '';

      html += `<label class="list-item"><input type="checkbox" class="${checkboxClass}" value="${item.rowIndex}"><div class="list-info"><strong>${item.name}</strong> (${item.email}) - <span style="color:#888;">${item.tag}</span><span class="badge-count">已發送 ${item.sendCount} 次</span><br><div style="margin-top:5px;">${readBadge}${clickBadge}</div></div></label>`;
    });
    return html;
  }

  function addRecipient() {
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    if(!name || !email) return alert("姓名與 Email 必填！");
    showStatus('addStatus', '寫入中...', '');
    fetchData({ action: "addRecipient", name: name, email: email, tag: document.getElementById('tag').value, source: document.getElementById('source').value })
      .then(data => { showStatus('addStatus', "✅ " + data.message, 'success'); document.getElementById('name').value = ""; document.getElementById('email').value = ""; });
  }

  function loadFirstSendList() {
    const container = document.getElementById('firstSendContainer');
    container.innerHTML = "讀取中...";
    fetchData({ action: "getFirstSendList" }).then(data => {
      if(data.data.length === 0) { container.innerHTML = "<p style='color:green;'>無名單。</p>"; document.getElementById('btnTriggerSend').style.display = "none"; return; }
      container.innerHTML = generateListHtml(data.data, 'chk-firstsend'); document.getElementById('btnTriggerSend').style.display = "block";
    });
  }

  function sendFirstEmails() {
    const cb = document.querySelectorAll('.chk-firstsend:checked');
    const rows = Array.from(cb).map(c => parseInt(c.value));
    if(rows.length === 0) return alert("請勾選！");
    showStatus('sendStatus', '發送中...', '');
    fetchData({ action: "triggerSend", selectedRows: rows }).then(data => { showStatus('sendStatus', "🎉 " + data.message, 'success'); loadFirstSendList(); });
  }

  function loadFollowUpList() {
    const container = document.getElementById('followUpContainer');
    container.innerHTML = "讀取中...";
    fetchData({ action: "getFollowUpList" }).then(data => {
      if(data.data.length === 0) { container.innerHTML = "<p style='color:green;'>無名單。</p>"; document.getElementById('btnSendFollowUp').style.display = "none"; return; }
      container.innerHTML = generateListHtml(data.data, 'chk-followup'); document.getElementById('btnSendFollowUp').style.display = "block";
    });
  }

  function sendFollowUps() {
    const cb = document.querySelectorAll('.chk-followup:checked');
    const rows = Array.from(cb).map(c => parseInt(c.value));
    if(rows.length === 0) return alert("請勾選！");
    showStatus('followUpStatus', '發送中...', '');
    fetchData({ action: "sendFollowUp", selectedRows: rows }).then(data => { showStatus('followUpStatus', "🎉 " + data.message, 'success'); loadFollowUpList(); });
  }

  function loadReEngageList() {
    const container = document.getElementById('reEngageContainer');
    container.innerHTML = "讀取中...";
    fetchData({ action: "getReEngageList" }).then(data => {
      if(data.data.length === 0) { container.innerHTML = "<p style='color:green;'>無名單。</p>"; document.getElementById('btnSendReEngage').style.display = "none"; return; }
      container.innerHTML = generateListHtml(data.data, 'chk-reengage'); document.getElementById('btnSendReEngage').style.display = "block";
    });
  }

  function sendReEngages() {
    const cb = document.querySelectorAll('.chk-reengage:checked');
    const rows = Array.from(cb).map(c => parseInt(c.value));
    if(rows.length === 0) return alert("請勾選！");
    showStatus('reEngageStatus', '發送中...', '');
    fetchData({ action: "sendReEngage", selectedRows: rows }).then(data => { showStatus('reEngageStatus', "🎉 " + data.message, 'success'); loadReEngageList(); });
  }

  function fetchData(payload) {
    return fetch(WEB_APP_URL, { method: 'POST', redirect: 'follow', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) }).then(res => res.json()).catch(err => alert("連線失敗。"));
  }
  function showStatus(id, msg, type) { const el = document.getElementById(id); el.style.display = "block"; el.innerText = msg; el.className = "status-box " + type; }
</script>

</body>
</html>
