<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 銀鑫業務開發 CRM</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 30px; color: #333; }
    .container { max-width: 650px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h2 { color: #2c3e50; border-bottom: 2px solid #eceff1; padding-bottom: 10px; }
    .section { margin-bottom: 25px; padding: 20px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fafafa; }
    label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #444; }
    input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    .row { display: flex; gap: 15px; }
    .row > div { flex: 1; }
    button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .btn-add { background-color: #2ecc71; color: white; margin-bottom: 10px; }
    .btn-add:hover { background-color: #27ae60; }
    .btn-preview { background-color: #f39c12; color: white; }
    .btn-preview:hover { background-color: #d68910; }
    .btn-send { background-color: #3498db; color: white; font-size: 18px; padding: 15px; }
    .btn-send:hover { background-color: #2980b9; }
    .status-box { margin-top: 10px; padding: 12px; border-radius: 6px; font-size: 14px; display: none; font-weight: bold; }
    .success { background-color: #d4edda; color: #155724; }
    .error { background-color: #f8d7da; color: #721c24; }
    .preview-box { background: #fff; border: 2px dashed #bdc3c7; padding: 15px; border-radius: 6px; margin-top: 15px; display: none; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>

<div class="container">
  <h2>🚀 銀鑫業務開發 CRM中控台</h2>
  
  <div class="section">
    <label>👤 客戶基本資料</label>
    <div class="row">
      <div>
        <input type="text" id="name" placeholder="姓名 (例: 王小明 經理)" required>
      </div>
      <div>
        <input type="email" id="email" placeholder="Email" required>
      </div>
    </div>

    <label>🏷️ 精準行銷設定</label>
    <div class="row">
      <div>
        <select id="tag" onchange="generatePreview()">
          <option value="台灣廠房">🇹🇼 台灣廠房 (中文)</option>
          <option value="泰國市場">🇹🇭 泰國市場 (英文/泰文)</option>
          <option value="越南市場">🇻🇳 越南市場 (英文/越文)</option>
        </select>
      </div>
      <div>
        <select id="source" onchange="generatePreview()">
          <option value="AMPA台北汽配展">AMPA 台北汽配展</option>
          <option value="彰化廠區拜訪">實體拜訪 (如: 彰化/桃園廠區)</option>
          <option value="網路搜尋">網路搜尋 (陌生開發)</option>
        </select>
      </div>
    </div>
    
    <div class="row">
      <button type="button" class="btn-preview" onclick="generatePreview()">👀 即時預覽信件</button>
      <button type="button" class="btn-add" onclick="addRecipient()">➕ 寫入資料庫</button>
    </div>
    
    <!-- 預覽區塊 -->
    <div id="previewBox" class="preview-box"></div>
    <div id="addStatus" class="status-box"></div>
  </div>

  <div class="section" style="border-color: #3498db; background: #f0f7fc;">
    <label style="color: #2980b9;">🎯 自動發信與追蹤引擎</label>
    <p style="font-size: 13px; color: #555; margin-top: 0;">點擊後將批次寄出所有「等待寄出」的信件，並自動埋入 1x1 追蹤像素。客戶開信時，試算表會自動記錄時間。</p>
    <button type="button" class="btn-send" onclick="triggerBulkSend()">啟動自動發信機器人</button>
    <div id="sendStatus" class="status-box"></div>
  </div>
</div>

<script>
  // ⚠️ 將這裡替換成你剛剛「重新部署」獲得的 Apps Script 網址
  const WEB_APP_URL = "你的_WEB_APP_URL"; 

  // 即時預覽邏輯 (模擬後台的破冰句合成)
  function generatePreview() {
    const name = document.getElementById('name').value || "{姓名}";
    const source = document.getElementById('source').value;
    const tag = document.getElementById('tag').value;
    const previewBox = document.getElementById('previewBox');
    
    let icebreaker = "";
    if(source === "AMPA台北汽配展") icebreaker = "很高興上週在 AMPA 展與您交流。";
    else if(source === "彰化廠區拜訪") icebreaker = "日前前往貴廠區拜訪，希望能為您的設備維護提供協助。";
    else if(source === "網路搜尋") icebreaker = "透過網路得知貴公司在業界的專業，特此聯繫。";

    let previewContent = `<b>[ 系統模擬預覽 - 將依試算表範本發送 ]</b><br><hr>`;
    previewContent += `<b>收件人：</b> ${name} <br>`;
    previewContent += `<b>應用標籤：</b> ${tag} <br>`;
    previewContent += `<b>破冰句注入：</b> <span style="color:blue;">${icebreaker}</span> <br><br>`;
    previewContent += `<i>提示：按下送出後，系統會自動將破冰句與姓名套入「試算表內對應標籤」的完整範本中。</i>`;
    
    previewBox.innerHTML = previewContent;
    previewBox.style.display = "block";
  }

  function addRecipient() {
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const tag = document.getElementById('tag').value;
    const source = document.getElementById('source').value;
    const statusBox = document.getElementById('addStatus');
    
    if(!name || !email) return alert("姓名與 Email 必填！");
    
    statusBox.style.display = "block";
    statusBox.innerText = "資料寫入中...";
    statusBox.className = "status-box";

    fetch(WEB_APP_URL, {
      method: 'POST', redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: "addRecipient", name: name, email: email, tag: tag, source: source })
    })
    .then(res => res.json())
    .then(data => {
      statusBox.innerText = "✅ " + data.message;
      statusBox.className = "status-box success";
      document.getElementById('name').value = ""; // 保留 email 以外的欄位清空
      document.getElementById('email').value = "";
    }).catch(err => {
      statusBox.innerText = "❌ 連線失敗";
      statusBox.className = "status-box error";
    });
  }

  function triggerBulkSend() {
    const statusBox = document.getElementById('sendStatus');
    if(!confirm("確定要開始批次發信嗎？")) return;
    
    statusBox.style.display = "block";
    statusBox.innerText = "機器人運作中，請勿關閉網頁...";
    statusBox.className = "status-box";

    fetch(WEB_APP_URL, {
      method: 'POST', redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: "triggerSend" })
    })
    .then(res => res.json())
    .then(data => {
      statusBox.innerText = "🎉 " + data.message;
      statusBox.className = "status-box success";
    }).catch(err => {
      statusBox.innerText = "❌ 發生錯誤，請至試算表確認";
      statusBox.className = "status-box error";
    });
  }
</script>

</body>
</html>
